; ============================================================
;  MU 5.2 Turbo - Graphics / Post-FX settings
;  Edit a value and restart the client to apply.
;  (Environment variables MU_* override anything set here.)
; ============================================================

[Display]
; Frame-rate cap. This is the single biggest lever for STABLE, even frame pacing.
; Uncapped rendering is what makes FPS swing (sprints to 120 in light scenes, then
; stalls to 40 in crowds) - that swing is what feels like "lag". A fixed ceiling keeps
; frame time consistent, so light scenes hold steady and heavy scenes drop less harshly.
;   60 = rock-solid on any monitor (recommended for stability)
;   72 / 120 / 144 = match your monitor refresh for more fluidity (bigger relative drops)
;   0  = uncapped (old behaviour - max FPS, least stable pacing)
; (Environment variable MU_FRAME_CAP overrides this.)
FrameCap=120

[PostFX]
; Master switch for the whole post-processing pipeline (bloom + MSAA).
;   1 = on, 0 = off
Enabled=1

; Anti-aliasing (MSAA) sample count. Smooths jagged edges.
;   0 or 1 = off, 2 / 4 / 8 = quality level (4 recommended)
; NOTE: MSAA on the RGBA16F scene FBO is very expensive. With FXAA=1, MSAA=0 is
; recommended for best FPS (FXAA handles edge AA on the final composite).
MSAA=4

; Bloom - soft glow on bright areas (skill effects, torch flames, water highlights).
;   1 = on, 0 = off (MSAA still applies when Bloom=0)
; Lorencia bridge torches need Bloom=1 for the MU MAX Age-style flame halos.
Bloom=1
; Brightness needed before a pixel starts to glow (0.0 - 1.0).
BloomThreshold=0.880
BloomIntensity=0.800
BloomSoftKnee=0.40
BloomPasses=3

; FXAA edge anti-aliasing on the final composite (MU_NO_FXAA=1 to disable).
FXAA=0
FXAASharpness=0.65

; Screen-space ambient occlusion (off by default - moderate GPU cost).
SSAO=1
SSAOStrength=0.650
; Render SSAO at half resolution (much faster, barely visible difference).
SSAOHalfRes=1

; Depth of field (subtle defaults — only gentle far-distance softening).
DOF=1
DOFFocalRange=1200
DOFFarMaxBlur=0.22
DOFNearMaxBlur=0.12
DOFFarBlurRange=6000
DOFNearBlurRange=1500
DOFSamples=4

[Shadows]
; 3-cascade directional shadow maps (CSM). Replaces planar blob shadows when on.
;   1 = on, 0 = off  (MU_SHADOWS=1 or MU_NO_SHADOWS=1 override)
Enabled=1
; Shadow map resolution per cascade (512 / 1024 / 2048). 1024 is a good FPS/quality balance.
ShadowMapSize=1024
; Temporal cascade staggering: refresh the near cascade every frame, mid every 2nd, far every 3rd.
; Big FPS win (the shadow pass re-draws all casters per cascade); distant shadows refresh slightly
; slower (invisible in motion). 1 = on, 0 = off (MU_NO_SHADOW_STAGGER also disables).
Stagger=1

[TerrainPBR]
; PBR terrain tiles (requires tile VBO path).
;   1 = on, 0 = off  (MU_PBR_TERRAIN=1 override)
Enabled=1

[Grass]
Enabled=1

[Water]
Enabled=1

[Cloth]
Enabled=1

[Outlines]
Enabled=1
Intensity=108

[Effects]
; Brightness of skill/buff overlay particles drawn after bloom (percent, 10-100).
; Higher = brighter torch flames and additive fire in the reflection pass.
OverlayScale=49

[Fonts]
MSDF=1

[Sprites]
Modern=1

[Texture]
; Anisotropic filtering - sharpens textures (terrain/ground) at oblique angles.
;   0 = off, 2 / 4 / 8 / 16 = quality level (8 recommended for FPS)
Anisotropic=8

[GraphicsV2]
; Atmosphere remaster (sky dome, fog, terrain normals, Lorencia water + fire reflections).
; Outdoor maps only — indoor dungeons (Devil's Tower, BC, DS, CC) use legacy lighting.
; Lorencia only: water reflects sky + torch flames (half-res FBO, refreshed every 2nd frame).
;   1 = on, 0 = off
; (Environment variable MU_GFX2=1 overrides this.)
Enabled=1
; Preset: 0=Day, 1=Sunset, 2=Rain. Press F6 in Lorencia to cycle live.
Preset=0
FogStart=500
FogEnd=4000
Wetness=85
; Water Fresnel / reflection mix (0-100). Higher = stronger fire/sky reflection on Lorencia water.
ReflectionStrength=35

StaticTerrain=1
